        <div class= "text">
            <a href="#" class = "link-properties">About us</a> 
            <a href="productList.html" class = "link-properties">Shop</a> 
            <a href="#" class = "link-properties">Review</a> 
        </div>
        <section class = "nav-bar-image">
            <img src= "assets/icons/search.png" alt = "login" class="hide-mobile"/>
            <img src ="assets/icons/heart.png" alt="favorite" class="hide-mobile"/>
            <img src= "assets/icons/person.png" alt = "login"/>
            <a href="cart.html" class="cart-link">
                <img src= "assets/icons/shopping-bag.png" alt = "login"/>

    <body>
    <div class="mobile-menu" id="mobile-menu">
    <button class="close-menu" id="close-menu">✕</button>
    <ul>
        <li><a href="index.html">Shop Now <span>></span></a></li>
        <li><a href="productList.html">New Arrivals <span>></span></a></li>
        <li><a href="#">Best Sellers <span>></span></a></li>
        <li><a href="#">About Us <span>></span></a></li>
        <li><a href="#">Reviews <span>></span></a></li>
    </ul>
    </div>
        <section class="checkout">
            <h2> Checkout </h2>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill">
                </div>
            </div>
            <p>$40 till free shipping</p>

            <div class="products-summary">
                <div class="cart-all-product">
                    <div class="cart-heading">
                        <h3>Products</h3>
                        <h3 class="hide-mobile"> Weight </h3>
                        <h3> Price </h3>
                    </div>
                    <div id ="cart-row">        
                    </div> 
                </div>
                <div class="order-summary">
                    <h2>Order Summary</h2>
                    <div class="discount">
                        <h2>Discount voucher</h2>
                    </div>
                    <div class="code-apply">
                        <input type="text" placeholder="Enter Code">
                        <button class="apply">Apply</button>
                    </div>

                    <div class = "amount-rows">
                        <div class="summary-rows">
                            <h4> Sub Total </h4>
                            <p id="subtotal"> $0.00 </p>
                        </div>
                        <div class="summary-rows">
                            <h4> Discount </h4>
                            <p id="discount"> $0.00 </p>
                        </div>
                        <div class="summary-rows last-row">
                            <h4> Total </h4>
                            <p id="total"> $0.00 </p>
                        </div>
                    </div>
                    <a href="checkout.html">
                        <button class="checkout-button">Checkout</button>
                    </a>
                </div>
            </div>
            <button onclick="clearCart()">Clear Cart</button>

        </section>

        <script src="script/global.js"></script>
